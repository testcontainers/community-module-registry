<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Bus body - based on official kind logo: https://kind.sigs.k8s.io/logo/logo.png -->
<rect x="3" y="22" width="54" height="22" rx="4" fill="#75C5F0"/>
<!-- Teal cab windows on top right -->
<rect x="33" y="24" width="11" height="11" fill="#00B7A5"/>
<rect x="44" y="24" width="10" height="11" fill="#0794A3"/>
<!-- Gray-blue windows on left -->
<rect x="5" y="24" width="16" height="11" rx="2" fill="#A4B7BE"/>
<!-- Dark frame / undercarriage -->
<rect x="3" y="40" width="54" height="4" rx="2" fill="#3B4D56"/>
<!-- Wheels -->
<circle cx="14" cy="46" r="5" fill="#3B4D56"/>
<circle cx="14" cy="46" r="2" fill="#88A1A8"/>
<circle cx="44" cy="46" r="5" fill="#3B4D56"/>
<circle cx="44" cy="46" r="2" fill="#88A1A8"/>
<!-- Kubernetes helm wheel on bus body -->
<circle cx="25" cy="33" r="6" stroke="#326CE5" stroke-width="1.5" fill="none"/>
<circle cx="25" cy="33" r="2.5" fill="#326CE5"/>
<line x1="25" y1="30.5" x2="25" y2="27" stroke="#326CE5" stroke-width="1.5"/>
<circle cx="25" cy="27" r="1.5" fill="#326CE5"/>
<line x1="27.6" y1="31.5" x2="30.2" y2="29.3" stroke="#326CE5" stroke-width="1.5"/>
<circle cx="30.6" cy="28.9" r="1.5" fill="#326CE5"/>
<line x1="27.9" y1="34.3" x2="31" y2="35.1" stroke="#326CE5" stroke-width="1.5"/>
<circle cx="31.5" cy="35.2" r="1.5" fill="#326CE5"/>
<line x1="25" y1="35.5" x2="25" y2="39" stroke="#326CE5" stroke-width="1.5"/>
<circle cx="25" cy="39" r="1.5" fill="#326CE5"/>
<line x1="22.1" y1="34.3" x2="19" y2="35.1" stroke="#326CE5" stroke-width="1.5"/>
<circle cx="18.5" cy="35.2" r="1.5" fill="#326CE5"/>
<line x1="22.4" y1="31.5" x2="19.8" y2="29.3" stroke="#326CE5" stroke-width="1.5"/>
<circle cx="19.4" cy="28.9" r="1.5" fill="#326CE5"/>
</svg>
